apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobboard-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobboard-api
  template:
    metadata:
      labels:
        app: jobboard-api
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for hp in mysql:3306 mongo:27017 redis:6379 elasticsearch:9200; do
                echo "waiting for $hp"
                until nc -z "${hp%:*}" "${hp#*:}"; do sleep 2; done
              done
              echo "all dependencies reachable"
      containers:
        - name: jobboard-api
          image: ghcr.io/mneill1/jobboard-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: jobboard-config
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15