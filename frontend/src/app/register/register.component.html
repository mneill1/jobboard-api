<div class="min-h-screen bg-surface flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-card rounded-2xl shadow-xl border border-slate-200 px-8 py-10">

      <!-- Header -->
      <div class="mb-8 text-center">
        <span class="material-icons text-brand-600 text-4xl mb-2 block">person_add</span>
        <h1 class="text-2xl font-semibold text-slate-900">Create account</h1>
        <p class="text-sm text-slate-500 mt-1">Join JobBoard today</p>
      </div>

      <!-- Error -->
      <div *ngIf="error()"
           class="mb-5 flex items-start gap-2 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
        <span class="material-icons text-base mt-0.5">error_outline</span>
        <span>{{ error() }}</span>
      </div>

      <div class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com"
                 class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 placeholder-slate-400
                        text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••"
                 class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 placeholder-slate-400
                        text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
        </div>

        <!-- Role -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">I am a…</label>
          <div class="grid grid-cols-2 gap-2">
            <label class="flex items-center gap-2 p-3 rounded-lg border cursor-pointer transition
                          {{ role === 'APPLICANT' ? 'border-brand-500 bg-brand-50 text-brand-700' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300' }}">
              <input type="radio" [(ngModel)]="role" name="role" value="APPLICANT" class="sr-only" />
              <span class="material-icons text-base">person_search</span>
              <span class="text-sm font-medium">Job seeker</span>
            </label>
            <label class="flex items-center gap-2 p-3 rounded-lg border cursor-pointer transition
                          {{ role === 'COMPANY' ? 'border-brand-500 bg-brand-50 text-brand-700' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300' }}">
              <input type="radio" [(ngModel)]="role" name="role" value="COMPANY" class="sr-only" />
              <span class="material-icons text-base">business</span>
              <span class="text-sm font-medium">Company</span>
            </label>
          </div>
        </div>

        <!-- Company fields -->
        <div *ngIf="role === 'COMPANY'" class="space-y-4 pt-2 border-t border-slate-100">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide pt-1">Company details</p>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Company name</label>
            <input type="text" [(ngModel)]="companyName" name="companyName"
                   class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 text-sm
                          focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Industry</label>
              <input type="text" [(ngModel)]="companyIndustry" name="companyIndustry"
                     class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 text-sm
                            focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Size</label>
              <input type="text" [(ngModel)]="companySize" name="companySize" placeholder="e.g. 50–100"
                     class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 text-sm
                            focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Website</label>
            <input type="text" [(ngModel)]="companyWebsite" name="companyWebsite" placeholder="https://"
                   class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 text-sm
                          focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
          </div>
        </div>

      </div>

      <!-- Submit -->
      <button (click)="submit()"
              class="mt-6 w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-lg
                     transition-colors text-sm cursor-pointer border-0">
        Create account
      </button>

      <!-- Footer -->
      <p class="mt-5 text-center text-sm text-slate-500">
        Already have an account?
        <a routerLink="/login" class="text-brand-600 font-medium hover:underline">Sign in</a>
      </p>

    </div>
  </div>
</div>
