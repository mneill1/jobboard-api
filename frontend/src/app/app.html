<!-- Sticky top navbar -->
<header class="sticky top-0 z-50 bg-slate-900 shadow-lg">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 flex items-center justify-between h-14">

    <!-- Brand -->
    <a routerLink="/"
       class="flex items-center gap-2 text-white font-semibold text-lg tracking-tight no-underline hover:text-brand-300 transition-colors">
      <span class="material-icons text-brand-400" style="font-size:22px;">work</span>
      JobBoard
    </a>

    <!-- Nav links -->
    <nav class="flex items-center gap-3 text-sm">
      <ng-container *ngIf="!authService.isLoggedIn()">
        <a routerLink="/login"
           class="text-slate-300 hover:text-white transition-colors no-underline px-2 py-1">
          Sign in
        </a>
        <a routerLink="/register"
           class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-1.5 rounded-lg font-medium transition-colors no-underline">
          Register
        </a>
      </ng-container>

      <ng-container *ngIf="authService.isLoggedIn()">
        <a routerLink="/profile"
           class="text-slate-300 hover:text-white transition-colors no-underline flex items-center gap-1">
          <span class="material-icons" style="font-size:18px;">person</span>
          Profile
        </a>
        <span class="text-xs font-medium px-2 py-0.5 rounded-full
              {{ authService.getRole() === 'COMPANY' ? 'bg-amber-500/20 text-amber-300' : 'bg-brand-500/20 text-brand-300' }}">
          {{ authService.getRole() }}
        </span>
        <button (click)="logout()"
          class="text-slate-400 hover:text-white border border-slate-700 hover:border-slate-500 px-3 py-1 rounded-lg transition-colors text-sm cursor-pointer bg-transparent">
          Sign out
        </button>
      </ng-container>
    </nav>

  </div>
</header>

<router-outlet></router-outlet>
