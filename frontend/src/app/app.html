<nav style="background: #1a1a1a; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; font-family: sans-serif;">
  <a routerLink="/" style="font-size: 16px; font-weight: 500; color: white; text-decoration: none;">Job Board</a>

  <div style="display: flex; align-items: center; gap: 12px; font-size: 14px;">
    <ng-container *ngIf="!authService.isLoggedIn()">
      <a routerLink="/login" style="color: #d1d5db; text-decoration: none;">Login</a>
      <a routerLink="/register" style="padding: 6px 14px; background: #3b82d4; color: white; border-radius: 6px; text-decoration: none;">Register</a>
    </ng-container>
    <ng-container *ngIf="authService.isLoggedIn()">
      <span style="color: #d1d5db;">{{ authService.getRole() }}</span>
      <button
        (click)="logout()"
        style="padding: 6px 14px; background: transparent; color: #d1d5db; border: 1px solid #4b5563; border-radius: 6px; cursor: pointer; font-size: 14px;">
        Logout
      </button>
    </ng-container>
  </div>
</nav>

<router-outlet></router-outlet>
