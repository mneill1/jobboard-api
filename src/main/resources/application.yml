spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/jobboard
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      repositories:
        enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/jobboard
    username: root
    password: root
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  metrics:
    tags:
      applicatios: jobboard.api