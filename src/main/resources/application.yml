spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/jobboard
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      repositories:
        enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/jobboard
    username: root
    password: root
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 120000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
  cache:
    cache-names: jobs
    redis:
      enable-statistics: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

app:
  jwt:
    secret: "jobboard-secret-key-must-be-at-least-256-bits-long-for-hs256-algo"

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  metrics:
    tags:
      application: jobboard.api